name: Sports Site CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "sports/terraform/**"
      - "sports/terraform-bootstrap/**"
      - "sports/site/**"
      - "sports/lambda/**"
      - "sports/data/**"
      - "sports/scripts/**"
      - "sports/docs/**"
      - "sports/admin_manager/**"
      - "sports/README.md"
      - ".github/workflows/sports-validate.yml"
  pull_request:
    paths:
      - "sports/terraform/**"
      - "sports/terraform-bootstrap/**"
      - "sports/site/**"
      - "sports/lambda/**"
      - "sports/data/**"
      - "sports/scripts/**"
      - "sports/docs/**"
      - "sports/admin_manager/**"
      - "sports/README.md"
      - ".github/workflows/sports-validate.yml"
  workflow_dispatch:
    inputs:
      seed_database:
        description: "Run seed/ingest Lambda after deploy. Use only for first bootstrap or deliberate curated-data reset."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: sports-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Python compile check
        run: |
          python3 -m py_compile \
            sports/lambda/api/handler.py \
            sports/lambda/ingest/handler.py \
            sports/scripts/seed_data.py \
            sports/admin_manager/sports_admin_manager.py \
            sports/admin_manager/cognito_user_manager.py

      - name: JavaScript syntax check
        run: |
          node --check sports/site/app.js
          node --check sports/site/admin/admin.js
          node --check sports/site/sw.js

      - name: Terraform fmt
        run: |
          terraform -chdir=sports/terraform fmt -check -recursive
          terraform -chdir=sports/terraform-bootstrap fmt -check -recursive

      - name: Terraform init without backend
        run: |
          terraform -chdir=sports/terraform init -backend=false
          terraform -chdir=sports/terraform-bootstrap init -backend=false

      - name: Terraform validate
        run: |
          terraform -chdir=sports/terraform validate
          terraform -chdir=sports/terraform-bootstrap validate

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'sports/dev/terraform.tfstate' }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME || 'sports-aggregator' }}
      TF_VAR_environment: ${{ vars.TF_ENVIRONMENT || 'dev' }}
      TF_VAR_custom_domain_name: ${{ vars.CUSTOM_DOMAIN_NAME || 'sports.vk2ale.com' }}
      TF_VAR_cors_allow_origin: ${{ vars.CORS_ALLOW_ORIGIN || 'https://sports.vk2ale.com' }}
      TF_VAR_route53_zone_name: ${{ vars.ROUTE53_ZONE_NAME || 'vk2ale.com' }}
      TF_VAR_create_route53_records: ${{ vars.CREATE_ROUTE53_RECORDS || 'true' }}
      TF_VAR_enable_daily_ingest_schedule: ${{ vars.ENABLE_DAILY_INGEST_SCHEDULE || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required deployment settings
        run: |
          if [ -z "${AWS_ROLE_ARN}" ]; then
            echo "AWS_ROLE_ARN secret is required." >&2
            exit 1
          fi
          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "TF_STATE_BUCKET repository variable is required." >&2
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Bootstrap Terraform state bucket
        run: |
          set -euo pipefail
          echo "Using state bucket: ${TF_STATE_BUCKET}"
          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" >/dev/null 2>&1; then
            echo "State bucket already exists."
          else
            echo "Creating state bucket ${TF_STATE_BUCKET} in ${AWS_REGION}."
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET}" --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
          fi

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration \
            BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Terraform init
        working-directory: sports/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        working-directory: sports/terraform
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: sports/terraform
        run: terraform apply -auto-approve tfplan

      - name: Optional seed DynamoDB content
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_database == 'true' }}
        working-directory: sports/terraform
        run: |
          set -euo pipefail
          echo "WARNING: Manual seed requested. This upserts curated seed records by id."
          echo "Do not use this for normal redeploys of an existing site."
          INGEST_FUNCTION="$(terraform output -raw ingest_lambda_name)"
          aws lambda invoke \
            --function-name "${INGEST_FUNCTION}" \
            --cli-binary-format raw-in-base64-out \
            --payload '{}' \
            /tmp/sports-seed-response.json
          cat /tmp/sports-seed-response.json

      - name: Invalidate CloudFront cache
        working-directory: sports/terraform
        run: |
          set -euo pipefail
          DISTRIBUTION_ID="$(terraform output -raw cloudfront_distribution_id)"
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Write deployment summary
        working-directory: sports/terraform
        run: |
          {
            echo "## Sports site deployed"
            echo
            echo "- Site URL: $(terraform output -raw site_url)"
            echo "- CloudFront URL: $(terraform output -raw cloudfront_url)"
            echo "- API URL: $(terraform output -raw api_base_url)"
            echo "- Admin API URL: $(terraform output -raw admin_api_base_url)"
            echo "- Admin Cognito domain: $(terraform output -raw admin_cognito_domain_url)"
            echo "- Admin Cognito client ID: $(terraform output -raw admin_cognito_user_pool_client_id)"
            echo "- Admin Cognito user pool ID: $(terraform output -raw admin_cognito_user_pool_id)"
          } >> "${GITHUB_STEP_SUMMARY}"
