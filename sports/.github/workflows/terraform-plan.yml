name: Sports Terraform Plan

on:
  pull_request:
    paths:
      - "sports/terraform/**"
      - "sports/site/**"
      - "sports/lambda/**"

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        working-directory: sports/terraform
        run: terraform fmt -check
      - name: Terraform init
        working-directory: sports/terraform
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: sports/terraform
        run: terraform validate
