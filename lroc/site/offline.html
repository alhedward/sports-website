<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LROC | Offline</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#143b2d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LROC">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
  <main class="section">
    <div class="container" style="max-width:760px">
      <div class="card card-pad" style="text-align:center">
        <img src="assets/lroc-logo.png" alt="LROC logo" style="width:96px;height:auto;margin:0 auto 18px">
        <div class="eyebrow" style="display:inline-block;color:var(--accent);text-transform:uppercase;letter-spacing:.22em;font-size:12px;font-weight:700;margin-bottom:12px">Offline</div>
        <h1 style="margin-top:0">You are offline right now</h1>
        <p class="muted" style="line-height:1.8">The LROC app shell is available, but live member features, fresh member data and authenticated API actions need a network connection.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px">
          <a class="button secondary" href="index.html">Go to home</a>
          <button class="button" type="button" onclick="window.location.reload()">Try again</button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
