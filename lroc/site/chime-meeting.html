<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LROC | Online Meeting</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#143b2d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LROC">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body data-page="chime-meeting">
  <main id="app"></main>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    // Browser bundle compatibility for dependencies that still probe Node-style globals.
    window.global = window.global || window;
    window.globalThis = window.globalThis || window;
    window.process = window.process || { env: { NODE_ENV: 'production' }, browser: true };
    window.process.env = window.process.env || { NODE_ENV: 'production' };
  </script>
  <script>
    (function prepareLrocChimeSdkLoader() {
      window.lrocChimeSdkLoadError = '';
      window.lrocChimeSdkSource = 'local-bundle:amazon-chime-sdk-js@3.30.0';
      window.lrocChimeSdkBundleFailed = function () {
        window.lrocChimeSdkLoadError = 'Local Amazon Chime SDK bundle could not be loaded. Refresh the page after deployment/cache invalidation.';
        window.dispatchEvent(new CustomEvent('lroc:chime-sdk-failed', { detail: { message: window.lrocChimeSdkLoadError } }));
      };
    })();
  </script>
  <script src="assets/vendor/amazon-chime-sdk-js-3.30.0.bundle.js?v=3.0.55" onerror="window.lrocChimeSdkBundleFailed && window.lrocChimeSdkBundleFailed()"></script>
  <script src="app.js"></script>
</body>
</html>
